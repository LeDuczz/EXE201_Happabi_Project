spring:
  application:
    name: ${SPRING_APPLICATION_NAME}
  main:
    banner-mode: console

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
  jpa:
    database-platform: ${DIALECT_POSTGRESQL}
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    show-sql: ${SPRING_JPA_SHOW_SQL}
    properties:
      hibernate:
        jdbc:
          time_zone: ${SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE}
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL}
  # ========================
  # SECURITY / OAuth2
  # ========================
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

  # ========================
  # REDIS
  # ========================
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: 6000
    elasticsearch:
      repositories:
              enabled: true
  # ========================
  # CACHE
  # ========================
  cache:
    type: redis
    redis:
      time-to-live:

  # ========================
  # ELASTICSEARCH
  # ========================
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS}

  ai:
    model:
      chat: ${SPRING_AI_CHAT_PROVIDER:google-genai}
      audio:
        speech: none
        transcription: none
      embedding:
        text: ${AI_CHAT_RAG_EMBEDDING_PROVIDER:google-genai}
      image: none
      moderation: none
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.0-flash}
            temperature: ${GEMINI_CHAT_TEMPERATURE:0.2}
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              model: ${AI_CHAT_RAG_EMBEDDING_MODEL:gemini-embedding-001}
              dimensions: ${AI_CHAT_RAG_EMBEDDING_DIMENSION:768}
              task-type: ${AI_CHAT_RAG_EMBEDDING_TASK_TYPE:RETRIEVAL_DOCUMENT}
              auto-truncate: true
    vectorstore:
      pgvector:
        initialize-schema: ${AI_CHAT_RAG_PGVECTOR_INITIALIZE_SCHEMA:true}
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${AI_CHAT_RAG_EMBEDDING_DIMENSION:768}
        max-document-batch-size: ${AI_CHAT_RAG_PGVECTOR_BATCH_SIZE:10000}

server:
  port: ${SERVER_PORT}

logging:
  file:
    path: ${LOG_PATH:logs}


# ========================
# ACTUATOR (PROMETHEUS)
# ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      cors:
        allowed-origins: ${CORS_URL}
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${SPRING_APPLICATION_NAME}

# ========================
# APP ENV (dùng cho logback profile + ELK)
# ========================
app:
  env: ${APP_ENV:local}
  booking:
    payment-ttl-minutes: ${APP_BOOKING_PAYMENT_TTL_MINUTES:15}
  seed:
    admin:
      phone: ${APP_SEED_ADMIN_PHONE:}
      password: ${APP_SEED_ADMIN_PASSWORD:}
      full-name: ${APP_SEED_ADMIN_FULL_NAME:}
      email: ${APP_SEED_ADMIN_EMAIL:}
      enabled: ${APP_SEED_ADMIN_ENABLED:true}
  work-session:
    check-in-open-minutes: ${APP_WORK_SESSION_CHECK_IN_OPEN_MINUTES:10}
    auto-confirm-hours: ${APP_WORK_SESSION_AUTO_CONFIRM_HOURS:48}
    auto-confirm-fixed-delay-ms: ${APP_WORK_SESSION_AUTO_CONFIRM_FIXED_DELAY_MS:300000}
    evidence-retention-days: ${APP_WORK_SESSION_EVIDENCE_RETENTION_DAYS:60}
    evidence-cleanup-fixed-delay-ms: ${APP_WORK_SESSION_EVIDENCE_CLEANUP_FIXED_DELAY_MS:3600000}

# ========================
# Khi chưa có ELK, để host=localhost, logback sẽ fail-safe (async, neverBlock=true)
# AWS
# ========================
aws:
  iam:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

  region: ${AWS_REGION}

  s3:
    bucket: ${AWS_S3_BUCKET_NAME}

  sqs:
    file-cleanup-queue-url: ${AWS_SQS_FILE_CLEANUP_QUEUE_URL:}
    file-cleanup-worker-enabled: ${AWS_SQS_FILE_CLEANUP_WORKER_ENABLED:false}
    file-cleanup-poll-delay-ms: ${AWS_SQS_FILE_CLEANUP_POLL_DELAY_MS:5000}
    nurse-review-aggregation-queue-url: ${AWS_SQS_NURSE_REVIEW_AGGREGATION_QUEUE_URL:}
    nurse-review-aggregation-worker-enabled: ${AWS_SQS_NURSE_REVIEW_AGGREGATION_WORKER_ENABLED:false}
    nurse-review-aggregation-poll-delay-ms: ${AWS_SQS_NURSE_REVIEW_AGGREGATION_POLL_DELAY_MS:5000}

  cognito:
    user-pool-id: ${AWS_USER_POOL_ID}
    client-id: ${AWS_CLIENT_ID}
    client-secret: ${AWS_CLIENT_SECRET}
    domain: ${AWS_COGNITO_DOMAIN}

# ========================
# RATE LIMITING (Token Bucket)
# ========================
rate-limit:
  global:
    capacity: 300
    refill-tokens: 200
    refill-seconds: 60

  endpoints:
    register:
      capacity: 3
      refill-tokens: 1
      refill-seconds: 300
    verify-otp:
      capacity: 5
      refill-tokens: 1
      refill-seconds: 60
    resend-otp:
      capacity: 3
      refill-tokens: 1
      refill-seconds: 120
    login:
      capacity: 5
      refill-tokens: 1
      refill-seconds: 20
    social-sync:
      capacity: 10
      refill-tokens: 1
      refill-seconds: 10
    refresh:
      capacity: 10
      refill-tokens: 1
      refill-seconds: 10
    logout:
      capacity: 5
      refill-tokens: 1
      refill-seconds: 10
    forgot-password:
      capacity: 3
      refill-tokens: 1
      refill-seconds: 300
    reset-password:
      capacity: 5
      refill-tokens: 1
      refill-seconds: 60

realtime:
  socket:
    enabled: ${REALTIME_SOCKET_ENABLED:true}
    host: ${REALTIME_SOCKET_HOST:0.0.0.0}
    port: ${REALTIME_SOCKET_PORT:9093}

observability:
  audit:
    database:
      enabled: ${OBSERVABILITY_AUDIT_DATABASE_ENABLED:true}
    outbox:
      enabled: ${OBSERVABILITY_AUDIT_OUTBOX_ENABLED:true}
      topic: ${OBSERVABILITY_AUDIT_OUTBOX_TOPIC:audit.events}
  outbox:
    projector:
      enabled: ${OBSERVABILITY_OUTBOX_PROJECTOR_ENABLED:true}
      batch-size: ${OBSERVABILITY_OUTBOX_PROJECTOR_BATCH_SIZE:50}
      fixed-delay-ms: ${OBSERVABILITY_OUTBOX_PROJECTOR_FIXED_DELAY_MS:5000}
      retry-delay-seconds: ${OBSERVABILITY_OUTBOX_PROJECTOR_RETRY_DELAY_SECONDS:30}
      max-retry: ${OBSERVABILITY_OUTBOX_PROJECTOR_MAX_RETRY:5}
      audit-index-prefix: ${OBSERVABILITY_OUTBOX_PROJECTOR_AUDIT_INDEX_PREFIX:happabi-audit}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_VISION_MODEL:gpt-4o-mini}
  connect-timeout-ms: ${OPENAI_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${OPENAI_READ_TIMEOUT_MS:30000}

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  model: ${OPENROUTER_MODEL:openrouter/free}
  temperature: ${OPENROUTER_TEMPERATURE:0.2}
  site-url: ${OPENROUTER_SITE_URL:http://localhost:5173}
  app-name: ${OPENROUTER_APP_NAME:Happabi DEV}

ai-chat:
  provider: ${AI_CHAT_PROVIDER:openrouter}
  models:
    default: ${AI_CHAT_DEFAULT_MODEL:gemini-2.0-flash}
    reasoning: ${AI_CHAT_REASONING_MODEL:gemini-2.0-flash}
    fast: ${AI_CHAT_FAST_MODEL:gemini-2.0-flash-lite}
  rag:
    embedding-model: ${AI_CHAT_RAG_EMBEDDING_MODEL:gemini-embedding-001}
    embedding-dimension: ${AI_CHAT_RAG_EMBEDDING_DIMENSION:768}
    medium-threshold: ${AI_CHAT_RAG_MEDIUM_THRESHOLD:0.60}
    high-threshold: ${AI_CHAT_RAG_HIGH_THRESHOLD:0.85}
    
# ========================
# PayOs
# ========================
payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  return-url-success: ${RETURN_URL_SUCCESS}
  return-url-cancel: ${RETURN_URL_CANCEL}
